<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McMahon Ranch | Ranch Management</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#2c1a0e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
html{font-size:16px}
:root{
  --primary:#2c1a0e;
  --accent:#9b5b31;
  --accent-strong:#7f461f;
  --bg:#f6f2eb;
  --panel:#fffdf9;
  --panel-strong:#f0e7dc;
  --line:#d8cbbd;
  --text:#23160d;
  --muted:#645546;
  --success:#2f6b34;
  --success-bg:#e8f4e8;
  --warning:#8a5b00;
  --warning-bg:#fff3d8;
  --danger:#9f1f1f;
  --danger-bg:#fde8e8;
  --info:#244f7f;
  --info-bg:#e7f0f8;
  --shadow:0 8px 24px rgba(44,26,14,.12);
  --radius:12px;
}
body.high-viz{
  --primary:#000;
  --accent:#ffd400;
  --accent-strong:#c2a100;
  --bg:#fff55c;
  --panel:#fff94d;
  --panel-strong:#fff17b;
  --line:#000;
  --text:#000;
  --muted:#111;
  --success:#000;
  --success-bg:#d8ff63;
  --warning:#000;
  --warning-bg:#ffe84d;
  --danger:#000;
  --danger-bg:#ff8e63;
  --info:#000;
  --info-bg:#fff19a;
  --shadow:none;
}
body{
  margin:0;
  font-family:'Source Sans 3',sans-serif;
  background:linear-gradient(180deg,#eee3d2 0,#f6f2eb 200px);
  color:var(--text);
  min-height:100vh;
}
body.high-viz{background:var(--bg)}
button,input,select,textarea{font:inherit}
button,input,select{min-height:44px}
button{cursor:pointer}
a{color:inherit}
.app-shell{max-width:1640px;margin:0 auto;padding-bottom:48px}
header{
  background:var(--primary);
  color:#fff;
  padding:18px 18px 14px;
  position:sticky;
  top:0;
  z-index:20;
  box-shadow:0 4px 16px rgba(0,0,0,.18);
}
.header-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand h1{
  margin:0;
  font-family:'Playfair Display',serif;
  font-size:1.9rem;
  line-height:1;
  letter-spacing:.02em;
}
.brand p{
  margin:.35rem 0 0;
  font-size:.78rem;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:#d8c5ac;
}
.header-tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  min-height:44px;
  padding:0 14px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.18);
  background:rgba(255,255,255,.08);
  color:#fff;
  font-size:.95rem;
  font-weight:700;
}
.btn{
  min-height:44px;
  padding:0 16px;
  border-radius:10px;
  border:1px solid transparent;
  font-weight:700;
  transition:background .15s,border-color .15s,opacity .15s,color .15s;
}
.btn:hover{opacity:.92}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border-color:var(--line);color:var(--text)}
.btn-soft{background:var(--panel-strong);border-color:var(--line);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-chip{
  background:rgba(255,255,255,.08);
  border-color:rgba(255,255,255,.2);
  color:#fff;
}
.btn-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-sm{min-height:38px;padding:0 12px}
.tab-nav{
  display:flex;
  gap:8px;
  overflow:auto;
  padding:14px 18px 0;
  scrollbar-width:thin;
}
.tab-btn{
  border:0;
  border-bottom:3px solid transparent;
  background:transparent;
  color:#ceb89e;
  min-height:44px;
  padding:0 2px 10px;
  font-size:.95rem;
  font-weight:700;
  white-space:nowrap;
}
.tab-btn.active{color:#fff;border-bottom-color:#f4e7d3}
main{padding:20px 18px}
.section{margin-bottom:24px}
.section-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:14px}
.section-head h2,.section-head h3{
  margin:0;
  font-family:'Playfair Display',serif;
  font-size:1.5rem;
}
.section-head p{margin:4px 0 0;color:var(--muted)}
.actions{display:flex;gap:10px;flex-wrap:wrap}
.card-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px}
.card{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
.stat-card{padding:18px}
.stat-label{font-size:.78rem;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700}
.stat-value{font-size:2rem;font-weight:700;margin-top:8px;line-height:1}
.stat-meta{margin-top:8px;color:var(--muted);font-size:.95rem}
.split-grid{display:grid;grid-template-columns:1.25fr .95fr;gap:18px}
.stack{display:grid;gap:18px}
.panel{padding:18px}
.panel h3{
  margin:0 0 12px;
  font-family:'Playfair Display',serif;
  font-size:1.25rem;
}
.toolbar{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  align-items:center;
  margin-bottom:12px;
}
.search,.select,.input,.textarea{
  width:100%;
  border:1px solid var(--line);
  border-radius:10px;
  padding:0 14px;
  background:#fff;
  color:var(--text);
}
.search,.select,.input{height:44px}
.textarea{padding:12px 14px;min-height:92px;resize:vertical}
.search:focus,.select:focus,.input:focus,.textarea:focus{outline:2px solid transparent;border-color:var(--accent)}
.toolbar .search{max-width:280px}
.toolbar .select{max-width:220px}
.count{margin-left:auto;color:var(--muted);font-weight:700}
.table-wrap{
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:var(--radius);
  overflow:auto;
  box-shadow:var(--shadow);
}
table{width:100%;border-collapse:collapse;min-width:760px}
thead th{
  background:var(--primary);
  color:#f1deca;
  padding:12px 14px;
  text-align:left;
  font-size:.8rem;
  text-transform:uppercase;
  letter-spacing:.06em;
}
tbody td{
  padding:12px 14px;
  border-top:1px solid #efe5da;
  vertical-align:top;
}
tbody tr:hover{background:#fbf7f1}
.td-muted{color:var(--muted)}
.td-actions{white-space:nowrap;text-align:right}
.td-actions .btn{margin-left:6px}
.badge{
  display:inline-flex;
  align-items:center;
  min-height:24px;
  padding:0 10px;
  border-radius:999px;
  font-size:.76rem;
  font-weight:700;
  letter-spacing:.03em;
}
.b-ok{background:var(--success-bg);color:var(--success)}
.b-warn{background:var(--warning-bg);color:var(--warning)}
.b-danger{background:var(--danger-bg);color:var(--danger)}
.b-info{background:var(--info-bg);color:var(--info)}
.b-neutral{background:var(--panel-strong);color:var(--muted)}
.notice-stack{display:grid;gap:10px;margin-bottom:18px}
.notice{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid var(--line);
  background:var(--panel);
}
.notice strong{display:block;margin-bottom:3px}
.notice.info{background:var(--info-bg);border-color:#b8cfe4}
.notice.warn{background:var(--warning-bg);border-color:#e7c77c}
.notice.danger{background:var(--danger-bg);border-color:#e9b0b0}
.quick-list,.mini-list{display:grid;gap:10px}
.mini-item{
  display:flex;
  justify-content:space-between;
  align-items:flex-start;
  gap:10px;
  padding:12px 14px;
  background:var(--panel-strong);
  border:1px solid var(--line);
  border-radius:10px;
}
.mini-item h4{margin:0 0 4px;font-size:1rem}
.mini-item p{margin:0;color:var(--muted)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.field{display:flex;flex-direction:column;gap:6px}
.field.span-2{grid-column:span 2}
.field label{
  font-size:.8rem;
  text-transform:uppercase;
  letter-spacing:.08em;
  color:var(--muted);
  font-weight:700;
}
.hint{font-size:.85rem;color:var(--muted)}
.empty{padding:28px;color:var(--muted);text-align:center}
.inventory-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.inventory-card{padding:16px}
.inventory-card h4{margin:0 0 8px;font-size:1.1rem}
.meter{height:10px;border-radius:999px;background:#eadfd2;overflow:hidden;margin:10px 0}
.meter > span{display:block;height:100%;background:var(--success)}
.inventory-card.low .meter > span{background:var(--warning)}
.report-shell{display:grid;gap:18px}
.report-card{padding:18px}
.report-meta{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);margin-bottom:14px}
.report-table{min-width:unset}
.report-table table{min-width:unset}
.report-title{
  font-family:'Playfair Display',serif;
  font-size:1.3rem;
  margin:0 0 8px;
}
.settings-list{display:grid;gap:10px}
.settings-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  border:1px solid var(--line);
  border-radius:10px;
  background:var(--panel-strong);
}
.settings-row .btn{flex:0 0 auto}
.footer-gap{height:8px}
.modal-ov{
  position:fixed;
  inset:0;
  background:rgba(22,13,7,.55);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:18px;
  z-index:40;
}
.modal-ov.hidden{display:none}
.modal{
  width:min(760px,100%);
  max-height:92vh;
  display:flex;
  flex-direction:column;
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 20px 48px rgba(0,0,0,.25);
}
.modal-head,.modal-foot{
  padding:16px 18px;
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.modal-foot{border-bottom:0;border-top:1px solid var(--line);justify-content:flex-end;flex-wrap:wrap}
.modal-head h3{margin:0;font-family:'Playfair Display',serif;font-size:1.4rem}
.modal-body{padding:18px;overflow:auto}
.modal-close{
  width:44px;
  min-height:44px;
  border-radius:10px;
  background:transparent;
  border:1px solid var(--line);
  color:var(--text);
  font-size:1.25rem;
}
.modal-error{
  display:none;
  margin-bottom:14px;
  padding:12px 14px;
  border-radius:10px;
  background:var(--danger-bg);
  color:var(--danger);
  border:1px solid #e9b0b0;
  font-weight:700;
}
.modal-error.show{display:block}
.print-only{display:none}
@media (max-width:1200px){
  .card-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
  .split-grid{grid-template-columns:1fr}
}
@media (max-width:760px){
  .header-row{align-items:flex-start;flex-direction:column}
  .header-tools{width:100%;justify-content:flex-start}
  .form-grid,.grid-2,.card-grid{grid-template-columns:1fr}
  .field.span-2{grid-column:span 1}
  .count{margin-left:0;width:100%}
  main{padding:16px 14px}
  .tab-nav{padding:12px 14px 0}
}
@media print{
  body{background:#fff}
  header,.tab-nav,.toolbar,.actions,.btn,.settings-row button,.notice-stack:not(.print-keep),#toast-region,.modal-ov{display:none!important}
  main{padding:0}
  .section{margin:0}
  .card,.table-wrap,.report-card{box-shadow:none;border:1px solid #999}
  .print-only{display:block}
  .report-card{break-inside:avoid-page}
  .report-shell{gap:12px}
  .report-title{font-size:1.25rem}
  thead th{background:#2c1a0e!important;color:#fff!important}
}
</style>
</head>
<body>
<div class="app-shell">
  <header>
    <div class="header-row">
      <div class="brand">
        <h1 id="brand-name">McMahon Ranch</h1>
        <p id="brand-sub">Ranch Management</p>
      </div>
      <div class="header-tools">
        <span class="pill" id="withdrawal-pill">No active withdrawals</span>
        <button class="btn btn-chip" id="highviz-btn" type="button" onclick="toggleHighViz()">High-Viz Mode</button>
        <button class="btn btn-chip" type="button" onclick="openSettings()">Settings</button>
      </div>
    </div>
    <nav class="tab-nav">
      <button class="tab-btn active" data-tab="dashboard" type="button" onclick="switchTab('dashboard')">Dashboard</button>
      <button class="tab-btn" data-tab="cattle" type="button" onclick="switchTab('cattle')">Cattle</button>
      <button class="tab-btn" data-tab="operations" type="button" onclick="switchTab('operations')">Operations</button>
      <button class="tab-btn" data-tab="inventory" type="button" onclick="switchTab('inventory')">Inventory</button>
      <button class="tab-btn" data-tab="health" type="button" onclick="switchTab('health')">Health</button>
      <button class="tab-btn" data-tab="equipment" type="button" onclick="switchTab('equipment')">Equipment</button>
      <button class="tab-btn" data-tab="pastures" type="button" onclick="switchTab('pastures')">Pastures</button>
      <button class="tab-btn" data-tab="reports" type="button" onclick="switchTab('reports')">Reports</button>
    </nav>
  </header>

  <main id="app"></main>
</div>

<div id="toast-region" class="notice-stack" style="position:fixed;right:18px;bottom:18px;z-index:35;max-width:420px"></div>

<div id="modal-ov" class="modal-ov hidden">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modal-title"></h3>
      <button class="modal-close" type="button" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div id="modal-error" class="modal-error"></div>
      <div id="modal-body"></div>
    </div>
    <div id="modal-foot" class="modal-foot"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'mr_app_v2';
const LEGACY_KEYS = {
  cattle:'ranch_cattle',
  feedInv:'ranch_feed_inventory',
  feedLog:'ranch_feed_log',
  deliveries:'ranch_deliveries',
  health:'ranch_health',
  vacc:'ranch_vaccinations',
  equip:'ranch_equipment',
  service:'ranch_service',
  repairs:'ranch_repairs',
  locs:'ranch_locations',
  moves:'ranch_moves',
  settings:'ranch_settings'
};

let D = {};
let currentTab = 'dashboard';
let currentYear = new Date().getFullYear();
let modalState = null;
const ui = {
  cattleQ:'',
  cattleType:'',
  cattleStatus:'',
  cattleLocation:'',
  operationsType:'',
  reportYear: currentYear,
  healthShowResolved: false
};

function genId(prefix='id'){
  return prefix + '_' + Math.random().toString(36).slice(2,10);
}
function today(){
  return new Date().toISOString().split('T')[0];
}
function fmtDate(value){
  if(!value) return 'Not set';
  const [y,m,d] = value.split('-').map(Number);
  const names = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return `${names[m-1]} ${d}, ${y}`;
}
function fmtMoney(value){
  return value || value === 0 ? `$${Number(value).toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2})}` : 'Not set';
}
function esc(value){
  if(value == null) return '';
  return String(value)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}
function daysBetween(a,b){
  if(!a || !b) return 0;
  return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
}
function addDays(dateString, days){
  if(!dateString) return '';
  const d = new Date(dateString + 'T00:00:00');
  d.setDate(d.getDate() + Number(days || 0));
  return d.toISOString().split('T')[0];
}
function clamp(n,min,max){
  return Math.max(min, Math.min(max, n));
}
function byId(id){
  return document.getElementById(id);
}
function activeAnimalStatuses(){
  return ['Active','For Sale'];
}
function animalLabel(animal){
  return animal ? `${animal.tag}${animal.name ? ' | ' + animal.name : ''}` : 'Unknown animal';
}
function medName(id){
  const item = D.inventory.medications.find(x => x.id === id);
  return item ? item.name : '';
}
function feedName(id){
  const item = D.inventory.feed.find(x => x.id === id);
  return item ? item.name : '';
}
function feedUnit(id){
  const item = D.inventory.feed.find(x => x.id === id);
  return item ? item.unit : '';
}
function equipName(id){
  const item = D.equipment.find(x => x.id === id);
  return item ? item.name : '';
}
function headCount(locationName){
  return D.cattle.filter(c => c.location === locationName && activeAnimalStatuses().includes(c.status)).length;
}
function getWithdrawalAlerts(){
  const td = today();
  return D.treatments
    .filter(t => t.clearanceDate && t.clearanceDate >= td)
    .sort((a,b) => a.clearanceDate.localeCompare(b.clearanceDate));
}
function saveData(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(D));
}
function migrateLegacy(){
  const legacyCattle = getLegacy('cattle') || [];
  if(!legacyCattle.length) return null;
  const legacyFeedInv = getLegacy('feedInv') || [];
  const legacyHealth = getLegacy('health') || [];
  const legacyVacc = getLegacy('vacc') || [];
  const legacySettings = getLegacy('settings') || {};
  const seedData = seed();
  const data = {
    meta:{version:2,migratedAt:new Date().toISOString()},
    settings:{
      ranchName: legacySettings.ranchName || seedData.settings.ranchName,
      pid: legacySettings.pid || '',
      highViz:false,
      vets: Array.isArray(legacySettings.vets) && legacySettings.vets.length ? legacySettings.vets : seedData.settings.vets
    },
    cattle: legacyCattle.map(c => ({
      id:c.id || genId('cow'),
      tag:c.tag || '',
      name:c.name || '',
      type:c.type === 'Bull Calf' || c.type === 'Heifer Calf' ? 'Calf' : (c.type || 'Cow'),
      breed:c.breed || 'Commercial',
      dob:c.dob || '',
      location:c.location || '',
      status:c.status || 'Active',
      cciaTag:(c.cciTag || '').replace(/\D/g,'').slice(0,15),
      sire:c.sire || '',
      dam:c.dam || '',
      notes:c.notes || '',
      lastWeight:c.lastWeight || '',
      weightDate:c.weightDate || '',
      salePrice:c.salePrice || ''
    })),
    inventory:{
      feed:(legacyFeedInv.length ? legacyFeedInv : seedData.inventory.feed).map(item => ({
        id:item.id || genId('feed'),
        name:item.name || '',
        unit:item.unit || 'kg',
        onHand:Number(item.onHand || 0),
        threshold:Number(item.threshold || 0)
      })),
      medications: seedData.inventory.medications
    },
    feedLogs:getLegacy('feedLog') || seedData.feedLogs,
    deliveries:getLegacy('deliveries') || seedData.deliveries,
    births: seedData.births,
    salesDeaths: seedData.salesDeaths,
    treatments: legacyHealth.map(h => {
      const withdrawalDays = h.withdrawal && h.startDate ? Math.max(0, daysBetween(h.startDate, h.withdrawal)) : 0;
      return {
        id:h.id || genId('tx'),
        tag:h.tag || '',
        condition:h.condition || '',
        medicationId:'',
        medicationName:'',
        inventoryQtyUsed:'',
        dosage:h.dosage || '',
        treatment:h.treatment || '',
        startDate:h.startDate || today(),
        endDate:h.endDate || '',
        withdrawalDays,
        clearanceDate:h.withdrawal || addDays(h.startDate || today(), withdrawalDays),
        vet:h.vet || 'In-house',
        status:h.status || 'Ongoing',
        notes:h.notes || ''
      };
    }),
    vaccinations:legacyVacc,
    equipment:getLegacy('equip') || seedData.equipment,
    service:getLegacy('service') || seedData.service,
    repairs:getLegacy('repairs') || seedData.repairs,
    locations:getLegacy('locs') || seedData.locations,
    moves:getLegacy('moves') || seedData.moves
  };
  return normalizeData(data);
}
function getLegacy(name){
  const raw = localStorage.getItem(LEGACY_KEYS[name]);
  return raw ? JSON.parse(raw) : null;
}
function normalizeData(data){
  const base = defaultData();
  const merged = {
    meta:{version:2},
    settings:{...base.settings,...(data.settings || {})},
    cattle:Array.isArray(data.cattle) ? data.cattle : base.cattle,
    inventory:{
      feed:Array.isArray(data.inventory && data.inventory.feed) ? data.inventory.feed : base.inventory.feed,
      medications:Array.isArray(data.inventory && data.inventory.medications) ? data.inventory.medications : base.inventory.medications
    },
    feedLogs:Array.isArray(data.feedLogs) ? data.feedLogs : base.feedLogs,
    deliveries:Array.isArray(data.deliveries) ? data.deliveries : base.deliveries,
    births:Array.isArray(data.births) ? data.births : base.births,
    salesDeaths:Array.isArray(data.salesDeaths) ? data.salesDeaths : base.salesDeaths,
    treatments:Array.isArray(data.treatments) ? data.treatments : base.treatments,
    vaccinations:Array.isArray(data.vaccinations) ? data.vaccinations : base.vaccinations,
    equipment:Array.isArray(data.equipment) ? data.equipment : base.equipment,
    service:Array.isArray(data.service) ? data.service : base.service,
    repairs:Array.isArray(data.repairs) ? data.repairs : base.repairs,
    locations:Array.isArray(data.locations) ? data.locations : base.locations,
    moves:Array.isArray(data.moves) ? data.moves : base.moves
  };
  merged.settings.highViz = !!merged.settings.highViz;
  merged.settings.pid = merged.settings.pid || '';
  merged.settings.vets = Array.isArray(merged.settings.vets) && merged.settings.vets.length ? merged.settings.vets : ['In-house'];
  merged.cattle = merged.cattle.map(c => ({
    ...c,
    id:c.id || genId('cow'),
    cciaTag:(c.cciaTag || c.cciTag || '').replace(/\D/g,'').slice(0,15),
    type:c.type || 'Cow',
    status:c.status || 'Active'
  }));
  merged.treatments = merged.treatments.map(t => ({
    ...t,
    id:t.id || genId('tx'),
    medicationId:t.medicationId || '',
    medicationName:t.medicationName || ((merged.inventory.medications.find(x => x.id === t.medicationId) || {}).name || ''),
    inventoryQtyUsed:t.inventoryQtyUsed === 0 ? 0 : (t.inventoryQtyUsed || ''),
    withdrawalDays:Number(t.withdrawalDays || 0),
    clearanceDate:t.clearanceDate || addDays(t.startDate || today(), Number(t.withdrawalDays || 0))
  }));
  merged.salesDeaths = merged.salesDeaths.map(item => ({
    ...item,
    id:item.id || genId('sd'),
    disposalMethod:item.disposalMethod || (item.kind === 'Sale' ? 'Sold' : 'Burial'),
    gstStatus:item.gstStatus || 'Not Applicable'
  }));
  return merged;
}
function loadData(){
  const current = localStorage.getItem(STORAGE_KEY);
  if(current){
    D = normalizeData(JSON.parse(current));
    return;
  }
  const migrated = migrateLegacy();
  D = migrated || seed();
  saveData();
}

function updateWithdrawalPill(){
  const alerts = getWithdrawalAlerts();
  const pill = byId('withdrawal-pill');
  if(alerts.length){
    pill.textContent = `${alerts.length} withdrawal warning${alerts.length === 1 ? '' : 's'}`;
    pill.style.background = 'rgba(159,31,31,.92)';
  }else{
    pill.textContent = 'No active withdrawals';
    pill.style.background = 'rgba(255,255,255,.08)';

function switchTab(tab){
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.tab === tab));
  render();
}
function showToast(type,title,message,timeout=3200){
  const region = byId('toast-region');
  const item = document.createElement('div');
  item.className = `notice ${type}`;
  item.innerHTML = `<div><strong>${esc(title)}</strong><div>${esc(message)}</div></div>`;
  region.appendChild(item);
  window.setTimeout(() => item.remove(), timeout);
}
function openModal(title, bodyHtml, footHtml){
  modalState = {title};
  byId('modal-title').textContent = title;
  byId('modal-body').innerHTML = bodyHtml;
  byId('modal-foot').innerHTML = footHtml || '<button class="btn btn-outline" type="button" onclick="closeModal()">Close</button>';
  clearModalError();
  byId('modal-ov').classList.remove('hidden');
}
function closeModal(){
  byId('modal-ov').classList.add('hidden');
  modalState = null;
}
function showModalError(message){
  const box = byId('modal-error');
  box.textContent = message;
  box.classList.add('show');
}
function clearModalError(){
  const box = byId('modal-error');
  box.textContent = '';
  box.classList.remove('show');
}
function askConfirm(title, message, actionLabel, actionClass, fn){
  openModal(
    title,
    `<p style="margin:0;font-size:1rem;line-height:1.5">${esc(message)}</p>`,
    `<button class="btn btn-outline" type="button" onclick="closeModal()">Cancel</button>
     <button class="btn ${actionClass}" type="button" onclick="runConfirmedAction()">${esc(actionLabel)}</button>`
  );
  window.runConfirmedAction = function(){
    closeModal();
    delete window.runConfirmedAction;
    fn();
  };
}

function render(){
  const app = byId('app');
  if(currentTab === 'dashboard') app.innerHTML = renderDashboard();
  else if(currentTab === 'cattle') app.innerHTML = renderCattle();
  else if(currentTab === 'operations') app.innerHTML = renderOperations();
  else if(currentTab === 'inventory') app.innerHTML = renderInventory();
  else if(currentTab === 'health') app.innerHTML = renderHealth();
  else if(currentTab === 'equipment') app.innerHTML = renderEquipment();
  else if(currentTab === 'pastures') app.innerHTML = renderPastures();
  else if(currentTab === 'reports') app.innerHTML = renderReports();
}

function inventoryCard(item, kind){
  const pct = clamp(Math.round((item.onHand / Math.max(item.threshold * 3 || 1, item.onHand || 1)) * 100), 4, 100);
  const low = Number(item.onHand) <= Number(item.threshold);
  const group = kind === 'feed' ? 'feed' : 'medications';
  return `
    <div class="card inventory-card ${low ? 'low' : ''}">
      <div class="section-head" style="margin-bottom:0">
        <div>
          <h4>${esc(item.name)}</h4>
          <p>${esc(item.onHand)} ${esc(item.unit)} on hand</p>
        </div>
        <span class="badge ${low ? 'b-warn' : 'b-ok'}">${low ? 'Low' : 'OK'}</span>
      </div>
      <div class="meter"><span style="width:${pct}%"></span></div>
      <div class="hint">Threshold: ${esc(item.threshold)} ${esc(item.unit)}</div>
      <div class="actions" style="margin-top:12px">
        <button class="btn btn-outline btn-sm" type="button" onclick="openInventoryItemModal('${group}','${item.id}')">Edit</button>
        <button class="btn btn-danger btn-sm" type="button" onclick="deleteInventoryItem('${group}','${item.id}')">Delete</button>
      </div>
    </div>
  `;
}

function renderReports(){
  const year = Number(ui.reportYear);
  const annualBirths = D.births.filter(b => Number((b.date || '').slice(0,4)) === year);
  const annualDeaths = D.salesDeaths.filter(x => x.kind === 'Death' && Number((x.date || '').slice(0,4)) === year);
  const currentHead = {
    Bull: D.cattle.filter(c => activeAnimalStatuses().includes(c.status) && c.type === 'Bull').length,
    Cow: D.cattle.filter(c => activeAnimalStatuses().includes(c.status) && c.type === 'Cow').length,
    Calf: D.cattle.filter(c => activeAnimalStatuses().includes(c.status) && c.type === 'Calf').length,
    Heifer: D.cattle.filter(c => activeAnimalStatuses().includes(c.status) && c.type === 'Heifer').length
  };
  const movementRows = [
    ...annualBirths.map(b => {
      const animal = D.cattle.find(c => c.tag === b.calfTag);
      return {
        date:b.date,
        direction:'Entered',
        animalTag:b.calfTag,
        cciaTag:animal ? animal.cciaTag : '',
        reason:'Birth on premises',
        notes:b.notes || ''
      };
    }),
    ...D.salesDeaths.filter(x => Number((x.date || '').slice(0,4)) === year).map(x => ({
      date:x.date,
      direction:'Left',
      animalTag:x.animalTag,
      cciaTag:x.cciaTag || '',
      reason:x.kind === 'Sale' ? `Sale | ${x.disposalMethod}` : `Death | ${x.disposalMethod}`,
      notes:x.notes || ''
    }))
  ].sort((a,b) => a.date.localeCompare(b.date));
  const salesRows = D.salesDeaths.filter(x => x.kind === 'Sale' && Number((x.date || '').slice(0,4)) === year).sort((a,b) => a.date.localeCompare(b.date));
  const totalSales = salesRows.reduce((sum, item) => sum + Number(item.amount || 0), 0);

  return `

    <div class="section-head">
      <div>

        <p>Printable business documents for livestock counts, CCIA movement, and tax-ready sales.</p>

function saveAnimal(id=''){
  clearModalError();
  const tag = byId('animal-tag').value.trim();
  const cciaTag = byId('animal-ccia').value.replace(/\D/g,'');
  if(!tag) return showModalError('Tag number is required.');
  if(cciaTag && cciaTag.length !== 15) return showModalError('CCIA / RFID tag must be 15 digits.');
  const dupe = D.cattle.find(c => c.tag.toLowerCase() === tag.toLowerCase() && c.id !== id);
  if(dupe) return showModalError('That tag number is already in use.');
  const animal = {
    id:id || genId('cow'),
    tag,
    name:byId('animal-name').value.trim(),
    cciaTag,
    type:byId('animal-type').value,
    breed:byId('animal-breed').value,
    dob:byId('animal-dob').value,
    status:byId('animal-status').value,
    location:byId('animal-location').value,
    sire:byId('animal-sire').value.trim(),
    dam:byId('animal-dam').value.trim(),
    lastWeight:byId('animal-weight').value ? Number(byId('animal-weight').value) : '',
    weightDate:byId('animal-weightdate').value,
    notes:byId('animal-notes').value.trim(),
    salePrice:id ? (D.cattle.find(c => c.id===id)?.salePrice || '') : ''
  };
  if(id){
    const idx = D.cattle.findIndex(c => c.id === id);
    D.cattle[idx] = animal;
  }else{
    D.cattle.push(animal);
  }
  saveData();
  closeModal();
  render();
  showToast('info','Animal saved', `${tag} updated in the roster.`);
}
function deleteAnimal(id){

function updateTreatmentMedicationMeta(){
  const medId = byId('tx-med').value;
  const meta = byId('tx-med-meta');
  if(!medId){
    meta.textContent = 'No medication inventory item selected.';
    return;
  }
  const med = D.inventory.medications.find(x => x.id === medId);
  meta.textContent = `${med.onHand} ${med.unit} available`;
}
function updateClearanceDate(){
  const start = byId('tx-start').value;
  const days = Number(byId('tx-withdrawal').value || 0);
  byId('tx-clearance').value = days > 0 ? addDays(start, days) : '';
}
function revertTreatmentInventory(item){
  if(!item.medicationId || !item.inventoryQtyUsed) return;
  const med = D.inventory.medications.find(x => x.id === item.medicationId);
  if(med) med.onHand += Number(item.inventoryQtyUsed || 0);
}
function saveTreatment(id=''){
  clearModalError();
  const tag = byId('tx-tag').value.trim();
  const condition = byId('tx-condition').value.trim();
  if(!tag || !condition) return showModalError('Animal tag and condition are required.');
  const medId = byId('tx-med').value;
  const qtyUsed = Number(byId('tx-qty').value || 0);
  const existing = id ? D.treatments.find(x => x.id === id) : null;
  if(medId){
    const med = D.inventory.medications.find(x => x.id === medId);
    if(!med) return showModalError('Selected medication inventory item was not found.');
    const available = med ? med.onHand + (existing && existing.medicationId === medId ? Number(existing.inventoryQtyUsed || 0) : 0) : 0;
    if(qtyUsed > available){
      return showModalError(`Only ${available} ${med.unit} available in medication inventory.`);
    }
  }
  if(existing) revertTreatmentInventory(existing);
  if(medId){
    const med = D.inventory.medications.find(x => x.id === medId);
    med.onHand -= qtyUsed;
  }
  const payload = {
    id:id || genId('tx'),
    tag,
    condition,
    medicationId:medId,
    medicationName:medId ? medName(medId) : '',
    inventoryQtyUsed:medId ? qtyUsed : '',
    dosage:byId('tx-dosage').value.trim(),
    treatment:byId('tx-treatment').value.trim(),
    startDate:byId('tx-start').value,
    endDate:byId('tx-end').value,
    withdrawalDays:Number(byId('tx-withdrawal').value || 0),
    clearanceDate:byId('tx-clearance').value,
    vet:byId('tx-vet').value,
    status:byId('tx-status').value,
    notes:byId('tx-notes').value.trim()
  };
  if(id){
    const idx = D.treatments.findIndex(x => x.id === id);
    D.treatments[idx] = payload;
  }else{
    D.treatments.push(payload);
  }
  saveData();
  closeModal();
  applyBranding();
  render();
  showToast('info','Treatment saved', `Treatment record updated for ${tag}.`);
}
function deleteTreatment(id){
  const item = D.treatments.find(x => x.id === id);

function calcNext(last, interval){
  if(!last || interval === 'As needed') return '';
  const d = new Date(last + 'T00:00:00');
  if(interval === 'Monthly') d.setMonth(d.getMonth() + 1);
  else if(interval === 'Quarterly') d.setMonth(d.getMonth() + 3);
  else if(interval === 'Semi-annual') d.setMonth(d.getMonth() + 6);
  else if(interval === 'Annual') d.setFullYear(d.getFullYear() + 1);
  return d.toISOString().split('T')[0];
}

  clearModalError();
  const tagsRaw = byId('move-tags').value.trim();
  const to = byId('move-to').value;
  if(!tagsRaw || !to) return showModalError('Animal tags and destination are required.');
  const tags = tagsRaw.split(',').map(tag => tag.trim()).filter(Boolean);
  tags.forEach(tag => {
    const animal = D.cattle.find(c => c.tag.toLowerCase() === tag.toLowerCase());
    if(animal) animal.location = to;
  });
  D.moves.push({
    id:genId('mv'),
    date:byId('move-date').value,
    animals:tagsRaw,
    from:byId('move-from').value,
    to,
    reason:byId('move-reason').value.trim()
  });
  saveData();
  closeModal();
  render();
}
function deleteMove(id){
  askConfirm('Delete Move', 'Delete this internal move record?', 'Delete', 'btn-danger', () => {
    D.moves = D.moves.filter(x => x.id !== id);
    saveData();
    render();
  });
}

function openSettings(){
  openModal(
    'Settings',
    `<div class="stack">
      <div>
        <div class="section-head"><div><h3>Ranch Settings</h3><p>Core business identity and compliance details.</p></div></div>
        <div class="form-grid">
          <div class="field"><label>Ranch Name</label><input id="set-ranch" class="input" type="text" value="${esc(D.settings.ranchName)}"></div>
          <div class="field"><label>Manitoba Premises ID (PID)</label><input id="set-pid" class="input" type="text" value="${esc(D.settings.pid || '')}"></div>
        </div>
      </div>
      <div>
        <div class="section-head"><div><h3>Vets / Treaters</h3><p>Available in treatment forms.</p></div></div>
        <div class="settings-list">
          ${D.settings.vets.map((vet,idx) => `
            <div class="settings-row">
              <span>${esc(vet)}</span>
              <button class="btn btn-danger btn-sm" type="button" onclick="removeVet(${idx})">Remove</button>
            </div>
          `).join('') || '<div class="empty">No vets set.</div>'}
        </div>
        <div class="actions" style="margin-top:12px">
          <input id="set-newvet" class="input" type="text" placeholder="Add vet or treater" style="max-width:320px">
          <button class="btn btn-outline" type="button" onclick="addVet()">Add</button>
        </div>
      </div>
      <div>
        <div class="section-head"><div><h3>Data Safety</h3><p>Manual backup and restore for year-end rollover or emergency recovery.</p></div></div>
        <div class="actions">
          <button class="btn btn-outline" type="button" onclick="exportData()">Export Data (JSON)</button>
          <button class="btn btn-primary" type="button" onclick="triggerImport()">Import Data</button>
          <input id="import-file" type="file" accept="application/json" style="display:none" onchange="importData(event)">
        </div>
      </div>
      <div>
        <div class="section-head"><div><h3>Display</h3><p>High-contrast outdoor mode for bright field conditions.</p></div></div>
        <button class="btn ${D.settings.highViz ? 'btn-accent' : 'btn-outline'}" type="button" onclick="toggleHighViz()">${D.settings.highViz ? 'High-Viz On' : 'High-Viz Off'}</button>
      </div>
    </div>`,
    `<button class="btn btn-outline" type="button" onclick="closeModal()">Close</button>
     <button class="btn btn-primary" type="button" onclick="saveSettings()">Save Settings</button>`
  );
}
function saveSettings(){
  clearModalError();
  const ranchName = byId('set-ranch').value.trim();
  if(!ranchName) return showModalError('Ranch name is required.');
  D.settings.ranchName = ranchName;
  D.settings.pid = byId('set-pid').value.trim();
  saveData();
  applyBranding();
  render();
  closeModal();
}
function addVet(){
  const input = byId('set-newvet');
  if(!input) return;
  const name = input.value.trim();
  if(!name) return;
  D.settings.vets.push(name);
  saveData();
  openSettings();
}
function removeVet(idx){
  D.settings.vets.splice(idx,1);
  saveData();
  openSettings();
}
function exportData(){
  const blob = new Blob([JSON.stringify(D,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mcmahon-ranch-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}
function triggerImport(){
  byId('import-file').click();
}
function importData(event){
  const file = event.target.files && event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try{
      const parsed = JSON.parse(e.target.result);
      D = normalizeData(parsed);
      saveData();
      applyBranding();
      render();
      closeModal();
      showToast('info','Import complete', 'Backup file imported successfully.');
    }catch(err){
      showToast('danger','Import failed', 'That file is not a valid ranch backup.');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function exportCattleCSV(){
  const headers = ['Tag','CCIA / RFID','Name','Type','Breed','DOB','Location','Status','Weight','Weight Date','Sire','Dam','Notes'];
  const rows = [headers];
  D.cattle.forEach(c => {
    rows.push([c.tag,c.cciaTag || '',c.name || '',c.type,c.breed || '',c.dob || '',c.location || '',c.status,c.lastWeight || '',c.weightDate || '',c.sire || '',c.dam || '',c.notes || '']);
  });
  const csv = rows.map(row => row.map(cell => {
    const value = String(cell == null ? '' : cell);
    return /[",\n]/.test(value) ? `"${value.replace(/"/g,'""')}"` : value;
  }).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `mcmahon-ranch-cattle-${today()}.csv`;
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(a.href);
}

byId('modal-ov').addEventListener('click', function(event){
  if(event.target === this) closeModal();
});
document.addEventListener('keydown', function(event){
  if(event.key === 'Escape') closeModal();
});

function registerServiceWorker(){
  if('serviceWorker' in navigator){
    window.addEventListener('load', function(){
      navigator.serviceWorker.register('./sw.js').catch(function(){});
    });
  }
}
function init(){
  loadData();
  applyBranding();
  render();
  registerServiceWorker();
}
init();
</script>
</body>
</html>
