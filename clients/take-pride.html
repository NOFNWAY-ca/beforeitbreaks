<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Take Pride</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Laila:wght@400;600;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #182059;
  --lime: #5DD600;
  --lime-dark: #4ab800;
  --white: #fff;
  --off-white: #f5f6fa;
  --border: #dde1ee;
  --text: #1a1a2e;
  --muted: #6b7280;
  --danger: #dc2626;
  --warn: #d97706;
  --info: #1d4ed8;
  --success: #166534;
  --status-scheduled: #1d4ed8;
  --status-inprogress: #d97706;
  --status-done: #166534;
  --status-cancelled: #6b7280;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'DM Sans', sans-serif; background: var(--off-white); color: var(--text); min-height: 100vh; }
h1,h2,h3,h4,h5 { font-family: 'Laila', serif; }
button { cursor: pointer; font-family: 'DM Sans', sans-serif; }
input, select, textarea { font-family: 'DM Sans', sans-serif; }

/* ── SPLASH ── */
#splash {
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--navy); padding: 2rem; gap: 1.5rem;
}
#splash img.logo { max-width: 280px; width: 100%; }
#splash .tagline { color: var(--white); font-size: 1.05rem; opacity: .8; letter-spacing: .04em; }
.splash-btns { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; }
.splash-btn {
  background: var(--lime); color: var(--navy); font-family: 'Laila', serif;
  font-size: 1.1rem; font-weight: 700; padding: .85rem 2rem; border: none;
  border-radius: 6px; cursor: pointer; transition: background .15s;
}
.splash-btn:hover { background: var(--lime-dark); }
.splash-link { color: var(--lime); font-size: .85rem; opacity: .8; background: none; border: none; text-decoration: underline; cursor: pointer; }
.splash-link:hover { opacity: 1; }

/* ── APP SHELL ── */
#app { display: none; flex-direction: column; min-height: 100vh; }
header {
  background: var(--navy); padding: .75rem 1.25rem;
  display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
}
header img.logo { height: 44px; }
.mode-badge {
  font-family: 'Laila', serif; font-size: .75rem; font-weight: 700;
  padding: .2rem .55rem; border-radius: 4px; letter-spacing: .06em;
}
.mode-badge.admin { background: var(--lime); color: var(--navy); }
.mode-badge.staff { background: #4b5563; color: #d1d5db; }
.file-name { color: #9ca3af; font-size: .82rem; flex: 1; min-width: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
#btn-export-header {
  background: var(--lime); color: var(--navy); border: none; font-weight: 700;
  padding: .45rem .9rem; border-radius: 5px; font-size: .82rem; white-space: nowrap;
}
#btn-export-header:hover { background: var(--lime-dark); }

nav {
  background: var(--white); border-bottom: 2px solid var(--border);
  display: flex; align-items: center; gap: .25rem; padding: 0 1rem;
  overflow-x: auto;
}
.nav-divider { width: 1px; height: 28px; background: var(--border); margin: 0 .4rem; flex-shrink: 0; }
.nav-btn {
  background: none; border: none; padding: .7rem .9rem;
  font-size: .9rem; font-weight: 500; color: var(--muted);
  border-bottom: 3px solid transparent; white-space: nowrap; transition: color .12s;
  margin-bottom: -2px;
}
.nav-btn:hover { color: var(--navy); }
.nav-btn.active { color: var(--navy); border-bottom-color: var(--lime); font-weight: 700; }

main { flex: 1; padding: 1.25rem; max-width: 1200px; margin: 0 auto; width: 100%; }
.panel { display: none; }
.panel.active { display: block; }

/* ── CARDS ── */
.card { background: var(--white); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; margin-bottom: 1.25rem; }
.card-header { display: flex; align-items: center; gap: .75rem; margin-bottom: 1rem; flex-wrap: wrap; }
.card-title { font-size: 1.05rem; font-family: 'Laila', serif; color: var(--navy); }

/* ── BUTTONS ── */
.btn { border: none; border-radius: 5px; padding: .45rem .9rem; font-size: .88rem; font-weight: 600; cursor: pointer; transition: background .12s; }
.btn-primary { background: var(--navy); color: var(--white); }
.btn-primary:hover { background: #1e2d6b; }
.btn-lime { background: var(--lime); color: var(--navy); }
.btn-lime:hover { background: var(--lime-dark); }
.btn-danger { background: #fee2e2; color: var(--danger); }
.btn-danger:hover { background: #fecaca; }
.btn-ghost { background: var(--off-white); color: var(--text); border: 1px solid var(--border); }
.btn-ghost:hover { background: #e9ebf3; }
.btn-sm { padding: .3rem .65rem; font-size: .8rem; }

/* ── FORMS ── */
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: .75rem; margin-bottom: .75rem; }
.form-row.single { grid-template-columns: 1fr; }
.form-row.triple { grid-template-columns: 1fr 1fr 1fr; }
.form-group { display: flex; flex-direction: column; gap: .3rem; }
label { font-size: .82rem; font-weight: 600; color: var(--muted); }
input[type=text], input[type=number], input[type=email], input[type=tel], input[type=date],
input[type=time], select, textarea {
  border: 1px solid var(--border); border-radius: 5px; padding: .45rem .65rem;
  font-size: .9rem; width: 100%; color: var(--text); background: var(--white);
}
input:focus, select:focus, textarea:focus { outline: none; border-color: var(--navy); }
textarea { resize: vertical; min-height: 80px; }

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: .88rem; }
th { background: var(--navy); color: var(--white); font-family: 'Laila', serif; font-weight: 600; padding: .55rem .75rem; text-align: left; white-space: nowrap; }
td { padding: .5rem .75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: var(--off-white); }
.cat-row td { background: #edf0fb; font-weight: 700; font-family: 'Laila', serif; color: var(--navy); font-size: .82rem; text-transform: uppercase; letter-spacing: .05em; }
.editing-row td { background: #fffbe6; }

/* ── SEARCH ── */
.search-input { position: relative; }
.search-input input { padding-left: 2rem; }
.search-input::before { content: '⌕'; position: absolute; left: .55rem; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 1rem; }

/* ── PILLS ── */
.pill-wrap { display: flex; gap: .4rem; flex-wrap: wrap; margin-bottom: 1rem; }
.pill { border: 1px solid var(--border); border-radius: 20px; padding: .25rem .75rem; font-size: .8rem; font-weight: 600; cursor: pointer; background: var(--white); color: var(--muted); }
.pill.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

/* ── MODALS ── */
.overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45);
  z-index: 100; align-items: center; justify-content: center; padding: 1rem;
}
.overlay.open { display: flex; }
.modal {
  background: var(--white); border-radius: 10px; padding: 1.5rem;
  max-width: 580px; width: 100%; max-height: 90vh; overflow-y: auto;
  box-shadow: 0 8px 32px rgba(0,0,0,.18);
}
.modal-wide { max-width: 780px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.modal-title { font-size: 1.15rem; color: var(--navy); }
.modal-close { background: none; border: none; font-size: 1.4rem; color: var(--muted); cursor: pointer; line-height: 1; }
.modal-footer { display: flex; justify-content: flex-end; gap: .75rem; margin-top: 1.25rem; padding-top: 1rem; border-top: 1px solid var(--border); }

/* ── INVOICE TAB ── */
.doc-toggle { display: flex; gap: 0; border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
.doc-toggle button { flex: 1; padding: .5rem 1.25rem; border: none; background: var(--off-white); color: var(--muted); font-weight: 700; font-size: .9rem; }
.doc-toggle button.active { background: var(--lime); color: var(--navy); }
.meta-row { display: flex; gap: .75rem; flex-wrap: wrap; align-items: flex-end; margin-bottom: 1rem; }
.meta-row .form-group { flex: 1; min-width: 140px; }
.product-picker { max-height: 260px; overflow-y: auto; border: 1px solid var(--border); border-radius: 6px; }
.picker-item { display: flex; align-items: center; gap: .75rem; padding: .5rem .75rem; border-bottom: 1px solid var(--border); font-size: .85rem; }
.picker-item:last-child { border-bottom: none; }
.picker-item:hover { background: var(--off-white); }
.picker-num { color: var(--muted); font-size: .78rem; white-space: nowrap; }
.picker-desc { flex: 1; }
.picker-price { color: var(--navy); font-weight: 700; white-space: nowrap; }
.totals-block { text-align: right; margin-top: .75rem; }
.totals-block .total-row { display: flex; justify-content: flex-end; gap: 2rem; padding: .2rem 0; font-size: .9rem; }
.totals-block .total-row.grand { font-family: 'Laila', serif; font-size: 1.15rem; color: var(--navy); font-weight: 700; border-top: 2px solid var(--navy); padding-top: .4rem; margin-top: .2rem; }
.total-label { color: var(--muted); }
.total-val { width: 90px; }

/* ── SCHEDULE ── */
.week-nav { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
.week-label { font-family: 'Laila', serif; font-size: 1.05rem; color: var(--navy); flex: 1; text-align: center; }
.week-board { display: grid; grid-template-columns: repeat(7, 1fr); gap: .5rem; }
.day-col { background: var(--white); border: 1px solid var(--border); border-radius: 6px; min-height: 120px; }
.day-header { background: var(--navy); color: var(--white); padding: .4rem .6rem; font-size: .8rem; font-weight: 700; border-radius: 5px 5px 0 0; text-align: center; }
.day-body { padding: .4rem; display: flex; flex-direction: column; gap: .35rem; }
.job-card { background: var(--off-white); border-left: 3px solid var(--navy); border-radius: 4px; padding: .35rem .5rem; cursor: pointer; font-size: .78rem; }
.job-card:hover { background: #edf0fb; }
.job-card .jc-client { font-weight: 700; color: var(--navy); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-card .jc-time { color: var(--muted); }
.job-card .jc-loc { color: var(--muted); font-size: .72rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.job-card .jc-chips { display: flex; gap: .2rem; flex-wrap: wrap; margin-top: .2rem; }
.emp-chip { width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; font-size: .6rem; font-weight: 700; color: var(--white); flex-shrink: 0; }
.status-badge { display: inline-block; font-size: .68rem; font-weight: 700; padding: .1rem .35rem; border-radius: 3px; margin-top: .2rem; }
.status-badge.scheduled { background: #dbeafe; color: var(--status-scheduled); }
.status-badge.inprogress { background: #fef3c7; color: var(--status-inprogress); }
.status-badge.done { background: #dcfce7; color: var(--status-done); }
.status-badge.cancelled { background: #f3f4f6; color: var(--status-cancelled); }
.add-day-placeholder { color: var(--muted); font-size: .75rem; text-align: center; padding: .5rem; cursor: pointer; border: 1px dashed var(--border); border-radius: 4px; }
.add-day-placeholder:hover { background: var(--off-white); }

/* ── COLOR SWATCHES ── */
.color-swatches { display: flex; gap: .5rem; flex-wrap: wrap; }
.color-swatch { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; }
.color-swatch.selected { border-color: var(--navy); }
.color-swatch input { display: none; }

/* ── HISTORY ── */
.empty-state { text-align: center; color: var(--muted); padding: 2rem; font-size: .95rem; }

/* ── CHECKBOX EMPLOYEES ── */
.emp-checkbox-list { display: flex; flex-direction: column; gap: .4rem; max-height: 180px; overflow-y: auto; }
.emp-checkbox-item { display: flex; align-items: center; gap: .6rem; font-size: .9rem; }

/* ── DATA TAB ── */
.data-stat { display: flex; gap: .5rem; flex-wrap: wrap; margin-bottom: 1rem; }
.stat-chip { background: var(--off-white); border: 1px solid var(--border); border-radius: 6px; padding: .4rem .9rem; font-size: .88rem; }
.stat-chip strong { color: var(--navy); }

/* ── OVERRIDE LIST ── */
.override-list { display: flex; flex-direction: column; gap: .4rem; max-height: 380px; overflow-y: auto; }
.override-item { display: flex; align-items: center; gap: .75rem; font-size: .85rem; padding: .3rem 0; border-bottom: 1px solid var(--border); }
.override-item:last-child { border-bottom: none; }
.override-item .oi-num { color: var(--muted); font-size: .78rem; width: 90px; flex-shrink: 0; }
.override-item .oi-desc { flex: 1; }
.override-item input[type=number] { width: 90px; padding: .3rem .5rem; font-size: .85rem; }

/* Responsive */
@media (max-width: 768px) {
  .week-board { grid-template-columns: repeat(3, 1fr); }
  .form-row { grid-template-columns: 1fr; }
  .form-row.triple { grid-template-columns: 1fr; }
}
@media (max-width: 480px) {
  .week-board { grid-template-columns: 1fr 1fr; }
}
</style>
</head>
<body>

<!-- ══ SPLASH ══ -->
<div id="splash">
  <img class="logo" id="splash-logo" alt="Take Pride logo">
  <p class="tagline">Products · Invoicing · Scheduling</p>
  <div class="splash-btns">
    <button class="splash-btn" onclick="triggerLoad('admin')">Open as Admin</button>
    <button class="splash-btn" style="background:#fff;color:var(--navy);" onclick="triggerLoad('staff')">Open as Staff</button>
  </div>
  <button class="splash-link" onclick="startFresh()">First time? Start fresh (Admin only)</button>
  <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadFile(event)">
</div>

<!-- ══ APP ══ -->
<div id="app">
  <header>
    <img class="logo" id="app-logo" alt="Take Pride logo">
    <span class="mode-badge" id="mode-badge"></span>
    <span class="file-name" id="file-name-display"></span>
    <button id="btn-export-header" onclick="exportData()" style="display:none">Export Data File</button>
  </header>
  <nav id="main-nav"></nav>
  <main id="main-content"></main>
</div>

<!-- ══ MODALS ══ -->

<!-- Product modal -->
<div class="overlay" id="modal-product">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="product-modal-title">Add Product</h3>
      <button class="modal-close" onclick="closeModal('modal-product')">&times;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Category</label>
        <select id="pm-cat"></select>
      </div>
      <div class="form-group">
        <label>Product #</label>
        <input type="text" id="pm-num" placeholder="e.g. CG115">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Description</label>
        <input type="text" id="pm-desc" placeholder="Product description">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Notes</label>
        <input type="text" id="pm-notes" placeholder="Optional notes">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Price ($)</label>
        <input type="number" id="pm-price" placeholder="0.00" step="0.01" min="0">
      </div>
      <div class="form-group">
        <label>Unit</label>
        <input type="text" id="pm-unit" placeholder="e.g. Case, Each">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-product')">Cancel</button>
      <button class="btn btn-primary" onclick="saveProduct()">Save Product</button>
    </div>
  </div>
</div>

<!-- Client modal -->
<div class="overlay" id="modal-client">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="client-modal-title">Add Client</h3>
      <button class="modal-close" onclick="closeModal('modal-client')">&times;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Business Name</label>
        <input type="text" id="cm-name" placeholder="Client name">
      </div>
      <div class="form-group">
        <label>Contact Name</label>
        <input type="text" id="cm-contact" placeholder="Contact person">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="cm-email" placeholder="email@example.com">
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="cm-phone" placeholder="(204) 000-0000">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Notes</label>
        <textarea id="cm-notes" placeholder="Optional notes"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-client')">Cancel</button>
      <button class="btn btn-primary" onclick="saveClient()">Save Client</button>
    </div>
  </div>
</div>

<!-- Employee modal -->
<div class="overlay" id="modal-employee">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="emp-modal-title">Add Employee</h3>
      <button class="modal-close" onclick="closeModal('modal-employee')">&times;</button>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Name</label>
        <input type="text" id="em-name" placeholder="Full name">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Role</label>
        <input type="text" id="em-role" placeholder="e.g. Cleaner, Supervisor">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Color</label>
        <div class="color-swatches" id="em-colors"></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-employee')">Cancel</button>
      <button class="btn btn-primary" onclick="saveEmployee()">Save Employee</button>
    </div>
  </div>
</div>

<!-- Price Overrides modal -->
<div class="overlay" id="modal-overrides">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 class="modal-title" id="overrides-modal-title">Price Overrides</h3>
      <button class="modal-close" onclick="closeModal('modal-overrides')">&times;</button>
    </div>
    <p style="font-size:.85rem;color:var(--muted);margin-bottom:.75rem">Leave blank to use the master price. Enter a custom price to override for this client.</p>
    <div class="override-list" id="overrides-list"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-overrides')">Cancel</button>
      <button class="btn btn-primary" onclick="saveOverrides()">Save Overrides</button>
    </div>
  </div>
</div>

<!-- Job modal -->
<div class="overlay" id="modal-job">
  <div class="modal modal-wide">
    <div class="modal-header">
      <h3 class="modal-title" id="job-modal-title">Add Job</h3>
      <button class="modal-close" onclick="closeModal('modal-job')">&times;</button>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Client</label>
        <select id="jm-client"></select>
      </div>
      <div class="form-group">
        <label>Title (optional)</label>
        <input type="text" id="jm-title" placeholder="Custom job title">
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Location</label>
        <input type="text" id="jm-location" placeholder="Address or location name">
      </div>
    </div>
    <div class="form-row triple">
      <div class="form-group">
        <label>Date</label>
        <input type="date" id="jm-date">
      </div>
      <div class="form-group">
        <label>Start Time</label>
        <input type="time" id="jm-start">
      </div>
      <div class="form-group">
        <label>End Time</label>
        <input type="time" id="jm-end">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Status</label>
        <select id="jm-status">
          <option value="scheduled">Scheduled</option>
          <option value="inprogress">In Progress</option>
          <option value="done">Done</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="form-group"></div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Assigned Employees</label>
        <div class="emp-checkbox-list" id="jm-employees"></div>
      </div>
    </div>
    <div class="form-row single">
      <div class="form-group">
        <label>Notes</label>
        <textarea id="jm-notes" placeholder="Optional notes"></textarea>
      </div>
    </div>
    <div id="jm-delete-row" style="display:none;margin-top:.5rem;">
      <button class="btn btn-danger btn-sm" onclick="deleteJob()">Delete Job</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modal-job')">Cancel</button>
      <button class="btn btn-primary" id="jm-save-btn" onclick="saveJob()">Save Job</button>
    </div>
  </div>
</div>

<!-- Job View (staff) modal -->
<div class="overlay" id="modal-job-view">
  <div class="modal">
    <div class="modal-header">
      <h3 class="modal-title" id="jv-title"></h3>
      <button class="modal-close" onclick="closeModal('modal-job-view')">&times;</button>
    </div>
    <div id="jv-body"></div>
    <div class="modal-footer">
      <label style="font-size:.88rem;font-weight:600;color:var(--muted)">Update Status:</label>
      <select id="jv-status-select" onchange="updateJobStatus()">

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmt$(n) {
  if (n === null || n === undefined || n === '') return '$—';
  const num = parseFloat(n);
  if (isNaN(num)) return '$—';
  return '$' + num.toFixed(2);
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function today() {
  return new Date().toISOString().slice(0,10);
}

function fmtDate(d) {
  if (!d) return '';
  const [y,m,dd] = d.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(m)-1] + ' ' + parseInt(dd) + ', ' + y;
}

function fmtTime(t) {
  if (!t) return '';
  const [h,m] = t.split(':');
  let hr = parseInt(h), ampm = 'am';
  if (hr >= 12) { ampm = 'pm'; if (hr > 12) hr -= 12; }
  if (hr === 0) hr = 12;
  return hr + ':' + m + ' ' + ampm;
}

function getMondayOf(d) {
  let dt = new Date(d + 'T00:00:00');
  let day = dt.getDay();
  let diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  return dt.toISOString().slice(0,10);
}

function addDays(dateStr, n) {
  let d = new Date(dateStr + 'T00:00:00');
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0,10);
}

function shortDay(dateStr) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let d = new Date(dateStr + 'T00:00:00');
  return days[d.getDay()];
}

function fullDayHeader(dateStr) {
  const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  let d = new Date(dateStr + 'T00:00:00');
  return days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
}

function getInitials(name) {
  if (!name) return '?';
  return name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0,2);
}

function closeModal(id) {
  document.getElementById(id).classList.remove('open');
}

function openModal(id) {
  document.getElementById(id).classList.add('open');
}

function confirm2(title, msg, cb) {
  document.getElementById('confirm-title').textContent = title;
  document.getElementById('confirm-msg').textContent = msg;
  const btn = document.getElementById('confirm-ok-btn');
  btn.onclick = () => { closeModal('modal-confirm'); cb(); };
  openModal('modal-confirm');
}

function peekNum(type) {
  const key = type === 'invoice' ? 'tp_inv_num' : 'tp_quo_num';
  const prefix = type === 'invoice' ? 'INV' : 'QT';
  const n = parseInt(localStorage.getItem(key) || '0') + 1;

}

  const n = parseInt(localStorage.getItem(key) || '0') + 1;
  localStorage.setItem(key, n);
}

function makeBlankDb() {
  return {
    version: 1,
    products: DEFAULT_PRODUCTS.map(p => ({...p, id: uid()})),
    clients: [],
    employees: [],
    templates: [],
    jobs: []
  };
}

function triggerLoad(mode) {
  pendingLoadMode = mode;
  document.getElementById('file-input').click();
}

function loadFile(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const parsed = JSON.parse(ev.target.result);
      db = parsed;
      // Ensure arrays exist
      db.products = db.products || [];
      db.clients = db.clients || [];
      db.employees = db.employees || [];
      db.templates = db.templates || [];
      db.jobs = db.jobs || [];
      FILE_NAME = file.name;
      launchApp(pendingLoadMode);
    } catch(err) {
      alert('Could not read that file. Make sure it is a valid takepride-data.json file.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
}

function startFresh() {
  db = makeBlankDb();
  FILE_NAME = 'New Database';
  launchApp('admin');
}

function exportData() {
  const blob = new Blob([JSON.stringify(db, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'takepride-data.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function buildNav() {
  const nav = document.getElementById('main-nav');

    {id:'employees',label:'Employees'},

    b.textContent = t.label;

function showTab(id) {
  currentTab = id;

  document.querySelectorAll('.nav-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.tab === id);

  // Render content
  const main = document.getElementById('main-content');
  main.innerHTML = '';
  const panel = document.createElement('div');
  panel.className = 'panel active';
  main.appendChild(panel);

  switch(id) {
    case 'products':   renderProducts(panel); break;
    case 'clients':    renderClients(panel); break;
    case 'employees':  renderEmployees(panel); break;
    case 'data':       renderData(panel); break;
    case 'invoice':    renderInvoice(panel); break;
    case 'history':    renderHistory(panel); break;
    case 'schedule':   renderSchedule(panel); break;
  }
}

function rerenderProducts() {
  const wrap = document.getElementById('products-table-wrap');
  if (wrap) buildProductsTable(wrap);
  // Rebuild pills
  const cats = getCategories();
  const pillWraps = document.querySelectorAll('.pill-wrap');
  if (pillWraps.length) {
    const pw = pillWraps[0];
    pw.innerHTML = '';
    ['All', ...cats].forEach(cat => {
      const p = document.createElement('button');
      p.className = 'pill' + (prodCatFilter === cat ? ' active' : '');
      p.textContent = cat;
      p.onclick = () => { prodCatFilter = cat; rerenderProducts(); };
      pw.appendChild(p);
    });
  }
}

function getCategories() {
  return [...new Set(db.products.map(p => p.cat))].filter(Boolean);
}

function getFilteredProducts() {
  let prods = db.products;
  if (prodCatFilter !== 'All') prods = prods.filter(p => p.cat === prodCatFilter);
  if (prodSearch.trim()) {
    const q = prodSearch.toLowerCase();
    prods = prods.filter(p =>
      (p.num||'').toLowerCase().includes(q) ||
      (p.desc||'').toLowerCase().includes(q) ||
      (p.cat||'').toLowerCase().includes(q)
    );
  }
  return prods;
}

function buildProductsTable(wrap) {
  wrap.innerHTML = '';
  const prods = getFilteredProducts();
  if (!prods.length) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.textContent = 'No products found.';
    wrap.appendChild(em);
    return;
  }

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Product #</th><th>Description</th><th>Notes</th><th>Price</th><th>Unit</th><th>Actions</th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');

  // Group by category
  let lastCat = null;
  prods.forEach(p => {
    if (p.cat !== lastCat) {
      lastCat = p.cat;
      const catRow = document.createElement('tr');
      catRow.className = 'cat-row';
      const td = document.createElement('td');
      td.colSpan = 6;
      td.textContent = p.cat;
      catRow.appendChild(td);
      tbody.appendChild(catRow);
    }

    if (editingProdRowId === p.id) {
      tbody.appendChild(buildEditRow(p));
    } else {
      const tr = document.createElement('tr');
      tr.dataset.id = p.id;

      const tdNum = document.createElement('td');
      tdNum.textContent = p.num;
      tr.appendChild(tdNum);

      const tdDesc = document.createElement('td');
      tdDesc.textContent = p.desc;
      tr.appendChild(tdDesc);

      const tdNotes = document.createElement('td');
      tdNotes.textContent = p.notes || '';
      tdNotes.style.fontSize = '.8rem';
      tdNotes.style.color = 'var(--muted)';
      tr.appendChild(tdNotes);

      const tdPrice = document.createElement('td');
      tdPrice.textContent = fmt$(p.price);
      tr.appendChild(tdPrice);

      const tdUnit = document.createElement('td');
      tdUnit.textContent = p.unit;
      tr.appendChild(tdUnit);

      const tdAct = document.createElement('td');
      const editBtn = document.createElement('button');
      editBtn.className = 'btn btn-ghost btn-sm';
      editBtn.textContent = 'Edit';
      editBtn.onclick = () => { editingProdRowId = p.id; rerenderProducts(); };
      tdAct.appendChild(editBtn);
      tdAct.appendChild(document.createTextNode(' '));
      const delBtn = document.createElement('button');
      delBtn.className = 'btn btn-danger btn-sm';
      delBtn.textContent = 'Delete';
      delBtn.onclick = () => confirm2('Delete Product', 'Delete "' + p.desc + '"? This cannot be undone.', () => {
        db.products = db.products.filter(x => x.id !== p.id);
        rerenderProducts();
      });
      tdAct.appendChild(delBtn);
      tr.appendChild(tdAct);

      tbody.appendChild(tr);
    }
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
}

function buildEditRow(p) {
  const tr = document.createElement('tr');
  tr.className = 'editing-row';

  const inputs = {};

  function makeCell(type, val, key, placeholder) {
    const td = document.createElement('td');
    const inp = document.createElement('input');
    inp.type = type;
    if (type === 'number') { inp.step = '0.01'; inp.min = '0'; }
    inp.value = val !== null && val !== undefined ? val : '';
    inp.placeholder = placeholder || '';
    inp.style.width = '100%';
    inp.style.minWidth = key === 'desc' ? '160px' : key === 'num' ? '80px' : '80px';
    inputs[key] = inp;
    td.appendChild(inp);
    return td;
  }

  tr.appendChild(makeCell('text', p.num, 'num', 'Product #'));
  tr.appendChild(makeCell('text', p.desc, 'desc', 'Description'));
  tr.appendChild(makeCell('text', p.notes, 'notes', 'Notes'));
  tr.appendChild(makeCell('number', p.price, 'price', '0.00'));
  tr.appendChild(makeCell('text', p.unit, 'unit', 'Unit'));

  const tdAct = document.createElement('td');

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn btn-lime btn-sm';
  saveBtn.textContent = 'Save';
  saveBtn.onclick = () => {
    const idx = db.products.findIndex(x => x.id === p.id);
    if (idx === -1) return;
    db.products[idx].num = inputs.num.value.trim();
    db.products[idx].desc = inputs.desc.value.trim();
    db.products[idx].notes = inputs.notes.value.trim();
    db.products[idx].price = inputs.price.value !== '' ? parseFloat(inputs.price.value) : null;
    db.products[idx].unit = inputs.unit.value.trim();
    editingProdRowId = null;
    rerenderProducts();
  };
  tdAct.appendChild(saveBtn);
  tdAct.appendChild(document.createTextNode(' '));

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn btn-ghost btn-sm';
  cancelBtn.textContent = 'Cancel';
  cancelBtn.onclick = () => { editingProdRowId = null; rerenderProducts(); };
  tdAct.appendChild(cancelBtn);

  tr.appendChild(tdAct);
  return tr;
}

function openProductModal(id) {
  editingProductId = id;
  const p = id ? db.products.find(x => x.id === id) : null;
  document.getElementById('product-modal-title').textContent = id ? 'Edit Product' : 'Add Product';

  // Build category select
  const sel = document.getElementById('pm-cat');
  sel.innerHTML = '';
  const cats = getCategories();
  cats.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c;
    opt.textContent = c;
    sel.appendChild(opt);
  });
  const newOpt = document.createElement('option');
  newOpt.value = '__new__';
  newOpt.textContent = 'Add new...';
  sel.appendChild(newOpt);

  sel.onchange = () => {
    if (sel.value === '__new__') {
      const nc = prompt('New category name:');
      if (nc && nc.trim()) {
        const opt = document.createElement('option');
        opt.value = nc.trim();
        opt.textContent = nc.trim();
        sel.insertBefore(opt, newOpt);
        sel.value = nc.trim();
      } else {
        sel.value = cats[0] || '';
      }
    }
  };

  document.getElementById('pm-num').value = p ? p.num : '';
  document.getElementById('pm-desc').value = p ? p.desc : '';
  document.getElementById('pm-notes').value = p ? (p.notes||'') : '';
  document.getElementById('pm-price').value = p && p.price !== null ? p.price : '';
  document.getElementById('pm-unit').value = p ? p.unit : '';
  if (p) sel.value = p.cat;

  openModal('modal-product');
}

function saveProduct() {
  const cat = document.getElementById('pm-cat').value.trim();
  const num = document.getElementById('pm-num').value.trim();
  const desc = document.getElementById('pm-desc').value.trim();
  const notes = document.getElementById('pm-notes').value.trim();
  const priceVal = document.getElementById('pm-price').value;
  const price = priceVal !== '' ? parseFloat(priceVal) : null;
  const unit = document.getElementById('pm-unit').value.trim();

  if (!desc) { alert('Description is required.'); return; }

  if (editingProductId) {
    const idx = db.products.findIndex(x => x.id === editingProductId);
    if (idx !== -1) Object.assign(db.products[idx], {cat,num,desc,notes,price,unit});
  } else {
    db.products.push({id:uid(),cat,num,desc,notes,price,unit});
  }
  closeModal('modal-product');
  rerenderProducts();
}

    phone: document.getElementById('cm-phone').value.trim(),
    notes: document.getElementById('cm-notes').value.trim(),
  };

  if (editingClientId) {
    const idx = db.clients.findIndex(x => x.id === editingClientId);
    if (idx !== -1) {
      db.clients[idx] = {...db.clients[idx], ...obj};
    }
  } else {
    db.clients.push({id:uid(), ...obj, priceOverrides:{}});
  }

  closeModal('modal-client');
  const wrap = document.getElementById('clients-table-wrap');
  if (wrap) buildClientsTable(wrap);
}

// Price Overrides
function openOverridesModal(clientId) {
  overridesClientId = clientId;
  const c = db.clients.find(x => x.id === clientId);
  document.getElementById('overrides-modal-title').textContent = 'Price Overrides — ' + c.name;
  const list = document.getElementById('overrides-list');
  list.innerHTML = '';

  db.products.forEach(p => {
    const item = document.createElement('div');
    item.className = 'override-item';

    const num = document.createElement('span');
    num.className = 'oi-num';
    num.textContent = p.num;
    item.appendChild(num);

    const desc = document.createElement('span');
    desc.className = 'oi-desc';
    desc.textContent = p.desc;
    item.appendChild(desc);

    const masterSpan = document.createElement('span');
    masterSpan.style.cssText = 'color:var(--muted);font-size:.78rem;white-space:nowrap';
    masterSpan.textContent = 'Master: ' + fmt$(p.price);
    item.appendChild(masterSpan);

    const inp = document.createElement('input');
    inp.type = 'number';
    inp.step = '0.01';
    inp.min = '0';
    inp.placeholder = p.price !== null ? p.price.toFixed(2) : '—';
    inp.dataset.pid = p.id;
    const existing = (c.priceOverrides || {})[p.id];
    inp.value = existing !== undefined ? existing : '';
    item.appendChild(inp);

    list.appendChild(item);
  });

function saveOverrides() {
  const c = db.clients.find(x => x.id === overridesClientId);
  if (!c) return;
  const overrides = {};
  document.querySelectorAll('#overrides-list input[data-pid]').forEach(inp => {
    if (inp.value !== '') {
      overrides[inp.dataset.pid] = parseFloat(inp.value);
    }
  });
  c.priceOverrides = overrides;
  closeModal('modal-overrides');
  const wrap = document.getElementById('clients-table-wrap');
  if (wrap) buildClientsTable(wrap);
}

function buildEmployeesTable(wrap) {
  wrap.innerHTML = '';

    em.textContent = 'No employees yet.';
    wrap.appendChild(em);
    return;
  }

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Name</th><th>Role</th><th>Color</th><th>Actions</th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  db.employees.forEach(e => {
    const tr = document.createElement('tr');

    const tdName = document.createElement('td');
    tdName.textContent = e.name;
    tr.appendChild(tdName);

    const tdRole = document.createElement('td');
    tdRole.textContent = e.role || '';
    tr.appendChild(tdRole);

    const tdColor = document.createElement('td');
    const chip = document.createElement('span');
    chip.className = 'emp-chip';
    chip.style.background = e.color;
    chip.textContent = getInitials(e.name);

function openEmployeeModal(id) {
  editingEmployeeId = id;
  const e = id ? db.employees.find(x => x.id === id) : null;
  document.getElementById('emp-modal-title').textContent = id ? 'Edit Employee' : 'Add Employee';
  document.getElementById('em-name').value = e ? e.name : '';
  document.getElementById('em-role').value = e ? (e.role||'') : '';

  const colorWrap = document.getElementById('em-colors');
  colorWrap.innerHTML = '';
  let selectedColor = e ? e.color : EMP_COLORS[0];
  EMP_COLORS.forEach(c => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch' + (c === selectedColor ? ' selected' : '');
    sw.style.background = c;
    sw.dataset.color = c;
    sw.onclick = () => {
      selectedColor = c;
      colorWrap.querySelectorAll('.color-swatch').forEach(s => s.classList.toggle('selected', s.dataset.color === c));
    };
    colorWrap.appendChild(sw);
  });

  openModal('modal-employee');
}

function saveEmployee() {
  const name = document.getElementById('em-name').value.trim();
  if (!name) { alert('Name is required.'); return; }
  const role = document.getElementById('em-role').value.trim();
  const selSwatch = document.querySelector('#em-colors .color-swatch.selected');
  const color = selSwatch ? selSwatch.dataset.color : EMP_COLORS[0];

  if (editingEmployeeId) {
    const idx = db.employees.findIndex(x => x.id === editingEmployeeId);
    if (idx !== -1) Object.assign(db.employees[idx], {name,role,color});
  } else {
    db.employees.push({id:uid(),name,role,color});
  }

  closeModal('modal-employee');
  const wrap = document.getElementById('employees-table-wrap');
  if (wrap) buildEmployeesTable(wrap);
}

function getEffectivePrice(pid, masterPrice) {
  if (!invClient) return masterPrice;
  const c = db.clients.find(x => x.id === invClient);
  if (!c) return masterPrice;
  const ov = (c.priceOverrides || {})[pid];
  return ov !== undefined ? ov : masterPrice;
}

function buildPickerList() {
  const list = document.getElementById('picker-list');
  if (!list) return;
  list.innerHTML = '';
  const q = (document.getElementById('picker-search')?.value || '').toLowerCase();
  let prods = db.products;
  if (q) prods = prods.filter(p =>
    (p.num||'').toLowerCase().includes(q) ||
    (p.desc||'').toLowerCase().includes(q)
  );

  if (!prods.length) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.style.padding = '1rem';
    em.textContent = 'No products found.';
    list.appendChild(em);
    return;
  }

  prods.forEach(p => {
    const item = document.createElement('div');
    item.className = 'picker-item';

    const num = document.createElement('span');
    num.className = 'picker-num';
    num.textContent = p.num;
    item.appendChild(num);

    const desc = document.createElement('span');
    desc.className = 'picker-desc';
    desc.textContent = p.desc;
    item.appendChild(desc);

    const eff = getEffectivePrice(p.id, p.price);
    const priceSpan = document.createElement('span');
    priceSpan.className = 'picker-price';
    priceSpan.textContent = fmt$(eff);
    item.appendChild(priceSpan);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-lime btn-sm';
    addBtn.textContent = '+ Add';
    addBtn.onclick = () => {
      invItems.push({
        id: uid(),
        pid: p.id,
        num: p.num,
        desc: p.desc,
        qty: 1,
        unit: p.unit,
        masterPrice: p.price,
        price: getEffectivePrice(p.id, p.price)
      });
      refreshInvoiceItems();
      refreshTotals();
    };
    item.appendChild(addBtn);
    list.appendChild(item);
  });
}

function refreshInvoiceItems() {
  const wrap = document.getElementById('inv-items-wrap');
  if (!wrap) return;
  wrap.innerHTML = '';

  if (!invItems.length) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.textContent = 'No items added yet.';
    wrap.appendChild(em);
    return;
  }

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Product #</th><th>Description</th><th>Qty</th><th>Unit</th><th>Unit Price</th><th>Total</th><th></th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  invItems.forEach((item, idx) => {
    const tr = document.createElement('tr');

    const tdNum = document.createElement('td');
    tdNum.textContent = item.num;
    tr.appendChild(tdNum);

    const tdDesc = document.createElement('td');
    tdDesc.textContent = item.desc;
    tr.appendChild(tdDesc);

    const tdQty = document.createElement('td');
    const qtyIn = document.createElement('input');
    qtyIn.type = 'number';
    qtyIn.min = '0';
    qtyIn.step = '0.01';
    qtyIn.value = item.qty;
    qtyIn.style.width = '70px';
    qtyIn.oninput = e => {
      invItems[idx].qty = parseFloat(e.target.value) || 0;
      refreshTotals();
    };
    tdQty.appendChild(qtyIn);
    tr.appendChild(tdQty);

    const tdUnit = document.createElement('td');
    tdUnit.textContent = item.unit;
    tr.appendChild(tdUnit);

    const tdPrice = document.createElement('td');
    const priceIn = document.createElement('input');
    priceIn.type = 'number';
    priceIn.min = '0';
    priceIn.step = '0.01';
    priceIn.value = item.price !== null && item.price !== undefined ? item.price : '';
    priceIn.style.width = '80px';
    priceIn.oninput = e => {
      invItems[idx].price = parseFloat(e.target.value) || 0;
      refreshTotals();
    };
    tdPrice.appendChild(priceIn);
    tr.appendChild(tdPrice);

    const tdTotal = document.createElement('td');
    tdTotal.id = 'item-total-' + item.id;
    const lineTotal = (item.price || 0) * (item.qty || 0);
    tdTotal.textContent = fmt$(lineTotal);
    tr.appendChild(tdTotal);

    const tdDel = document.createElement('td');
    const delBtn = document.createElement('button');
    delBtn.textContent = '×';
    delBtn.className = 'btn btn-danger btn-sm';
    delBtn.onclick = () => {
      invItems.splice(idx, 1);
      refreshInvoiceItems();
      refreshTotals();
    };
    tdDel.appendChild(delBtn);
    tr.appendChild(tdDel);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
}

function refreshTotals() {
  const totalsDiv = document.getElementById('inv-totals');
  if (!totalsDiv) return;
  const subtotal = invItems.reduce((s, i) => s + (i.price||0) * (i.qty||0), 0);
  const pst = subtotal * 0.07;
  const gst = subtotal * 0.05;
  const total = subtotal + pst + gst;

  totalsDiv.innerHTML = '';
  [
    ['Subtotal', subtotal],
    ['PST 7%', pst],
    ['GST 5%', gst],
  ].forEach(([label, val]) => {
    const row = document.createElement('div');
    row.className = 'total-row';
    const lbl = document.createElement('span');
    lbl.className = 'total-label';
    lbl.textContent = label;
    const v = document.createElement('span');
    v.className = 'total-val';
    v.textContent = fmt$(val);
    row.appendChild(lbl);
    row.appendChild(v);
    totalsDiv.appendChild(row);
  });

  const grandRow = document.createElement('div');
  grandRow.className = 'total-row grand';
  const gl = document.createElement('span');
  gl.className = 'total-label';
  gl.textContent = 'Total';
  const gv = document.createElement('span');
  gv.className = 'total-val';
  gv.textContent = fmt$(total);
  grandRow.appendChild(gl);
  grandRow.appendChild(gv);
  totalsDiv.appendChild(grandRow);
}

function showTemplateMenu(btn) {
  if (!db.templates.length) { alert('No templates saved yet.'); return; }
  // Simple select prompt
  const names = db.templates.map((t,i) => i + ': ' + t.name).join('\n');
  const choice = prompt('Select template number:\n' + names);
  if (choice === null) return;
  const idx = parseInt(choice);
  if (isNaN(idx) || idx < 0 || idx >= db.templates.length) { alert('Invalid selection.'); return; }
  const tpl = db.templates[idx];
  invItems = tpl.items.map(i => ({
    id: uid(),
    pid: i.pid,
    num: i.num,
    desc: i.desc,
    qty: i.qty,
    unit: i.unit,
    masterPrice: i.price,
    price: getEffectivePrice(i.pid, i.price)
  }));
  if (tpl.clientId) {
    invClient = tpl.clientId;
    const sel = document.getElementById('inv-client-sel');
    if (sel) sel.value = tpl.clientId;
  }
  refreshInvoiceItems();
  refreshTotals();
}

function previewInvoice() {
  if (!invNumCommitted) {
    commitNum(invType);
    invNumCommitted = true;
  }

  const numEl = document.getElementById('inv-number');
  const docNum = numEl ? numEl.value : peekNum(invType);
  const prepBy = (document.getElementById('inv-prepared-by')?.value || '').trim();
  const dateVal = document.getElementById('inv-date')?.value || today();
  const clientObj = invClient ? db.clients.find(c => c.id === invClient) : null;

  const subtotal = invItems.reduce((s, i) => s + (i.price||0) * (i.qty||0), 0);
  const pst = subtotal * 0.07;
  const gst = subtotal * 0.05;
  const total = subtotal + pst + gst;

  const logEntry = {
    id: uid(),
    type: invType,
    num: docNum,
    clientId: invClient,
    clientName: clientObj ? clientObj.name : '',
    date: dateVal,
    preparedBy: prepBy,
    total: total,
    items: JSON.parse(JSON.stringify(invItems)),
    notes: invNotes,
    savedAt: new Date().toISOString()
  };

  const printHtml = buildPrintHtml(logEntry, clientObj);
  logEntry.printHtml = printHtml;

  const log = JSON.parse(localStorage.getItem('tp_log') || '[]');
  log.unshift(logEntry);
  localStorage.setItem('tp_log', JSON.stringify(log));

  const win = window.open('', '_blank');
  win.document.write(printHtml);
  win.document.close();
}

  const total = subtotal + pst + gst;

  let itemRows = '';
  entry.items.forEach(item => {
    const lineTotal = (item.price||0) * (item.qty||0);
    itemRows += '<tr><td>' + esc(item.num) + '</td><td>' + esc(item.desc) + '</td><td style="text-align:center">' + esc(String(item.qty)) + '</td><td>' + esc(item.unit) + '</td><td style="text-align:right">' + esc(fmt$(item.price)) + '</td><td style="text-align:right">' + esc(fmt$(lineTotal)) + '</td></tr>';

  const notesSection = entry.notes ? '<div class="section"><strong>Notes:</strong><p>' + esc(entry.notes) + '</p></div>' : '';

  return `<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>${esc(label)} ${esc(entry.num)}</title>

function renderHistory(panel) {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = '<div class="card-header"><span class="card-title">Invoice & Quote History</span></div>';

  const wrap = document.createElement('div');
  wrap.className = 'tbl-wrap';
  wrap.id = 'history-table-wrap';
  card.appendChild(wrap);
  panel.appendChild(card);
  buildHistoryTable(wrap);
}

function buildHistoryTable(wrap) {
  wrap.innerHTML = '';
  const log = JSON.parse(localStorage.getItem('tp_log') || '[]');

  if (!log.length) {
    const em = document.createElement('div');
    em.className = 'empty-state';
    em.textContent = 'No history yet. Preview an invoice or quote to save it here.';
    wrap.appendChild(em);
    return;
  }

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = '<tr><th>Type</th><th>#</th><th>Client</th><th>Date</th><th>Prepared By</th><th>Total</th><th>Actions</th></tr>';
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  log.forEach((entry, idx) => {
    const tr = document.createElement('tr');

    const tdType = document.createElement('td');
    tdType.textContent = entry.type === 'quote' ? 'Quote' : 'Invoice';
    tr.appendChild(tdType);

    const tdNum = document.createElement('td');
    tdNum.textContent = entry.num;
    tr.appendChild(tdNum);

    const tdClient = document.createElement('td');
    tdClient.textContent = entry.clientName || '—';
    tr.appendChild(tdClient);

    const tdDate = document.createElement('td');
    tdDate.textContent = fmtDate(entry.date);
    tr.appendChild(tdDate);

    const tdPrep = document.createElement('td');
    tdPrep.textContent = entry.preparedBy || '—';
    tr.appendChild(tdPrep);

    const tdTotal = document.createElement('td');
    tdTotal.textContent = fmt$(entry.total);
    tr.appendChild(tdTotal);

    const tdAct = document.createElement('td');
    const viewBtn = document.createElement('button');
    viewBtn.className = 'btn btn-ghost btn-sm';
    viewBtn.textContent = 'View';
    viewBtn.onclick = () => {
      if (entry.printHtml) {
        const win = window.open('', '_blank');
        win.document.write(entry.printHtml);
        win.document.close();
      } else {
        alert('No print preview saved for this entry.');
      }
    };
    tdAct.appendChild(viewBtn);
    tdAct.appendChild(document.createTextNode(' '));
    const delBtn = document.createElement('button');
    delBtn.className = 'btn btn-danger btn-sm';
    delBtn.textContent = 'Delete';
    delBtn.onclick = () => confirm2('Delete Entry', 'Delete this history entry?', () => {
      const log2 = JSON.parse(localStorage.getItem('tp_log') || '[]');
      log2.splice(idx, 1);
      localStorage.setItem('tp_log', JSON.stringify(log2));
      buildHistoryTable(document.getElementById('history-table-wrap'));
    });
    tdAct.appendChild(delBtn);
    tr.appendChild(tdAct);

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  wrap.appendChild(table);
}

function renderSchedule(panel) {
  if (!schedWeekStart) schedWeekStart = getMondayOf(today());

  const card = document.createElement('div');
  card.className = 'card';

  // Week nav
  const weekNav = document.createElement('div');
  weekNav.className = 'week-nav';

  const prevBtn = document.createElement('button');
  prevBtn.className = 'btn btn-ghost btn-sm';
  prevBtn.textContent = '< Prev';
  prevBtn.onclick = () => { schedWeekStart = addDays(schedWeekStart, -7); renderSchedule(panel); };
  weekNav.appendChild(prevBtn);

  const weekEnd = addDays(schedWeekStart, 6);
  const weekLabel = document.createElement('span');
  weekLabel.className = 'week-label';
  weekLabel.textContent = fmtDate(schedWeekStart).replace(/,.*/, '') + ' – ' + fmtDate(weekEnd).replace(/,.*/, '') + ', ' + schedWeekStart.slice(0,4);
  weekNav.appendChild(weekLabel);

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-ghost btn-sm';
  nextBtn.textContent = 'Next >';
  nextBtn.onclick = () => { schedWeekStart = addDays(schedWeekStart, 7); renderSchedule(panel); };
  weekNav.appendChild(nextBtn);

  if (MODE === 'admin') {
    const addJobBtn = document.createElement('button');
    addJobBtn.className = 'btn btn-lime btn-sm';
    addJobBtn.textContent = '+ Add Job';
    addJobBtn.onclick = () => openJobModal(null, null);
    weekNav.appendChild(addJobBtn);
  }

  card.appendChild(weekNav);

  // Week board
  const board = document.createElement('div');
  board.className = 'week-board';

  const jobStatuses = JSON.parse(localStorage.getItem('tp_job_status') || '{}');

  for (let i = 0; i < 7; i++) {
    const dateStr = addDays(schedWeekStart, i);
    const col = document.createElement('div');
    col.className = 'day-col';

    const hdr = document.createElement('div');
    hdr.className = 'day-header';
    hdr.textContent = fullDayHeader(dateStr);
    col.appendChild(hdr);

    const body = document.createElement('div');
    body.className = 'day-body';

    const dayJobs = db.jobs.filter(j => j.date === dateStr);
    dayJobs.forEach(job => {
      const status = jobStatuses[job.id] || job.status || 'scheduled';
      const card2 = document.createElement('div');
      card2.className = 'job-card';
      card2.style.borderLeftColor = getStatusColor(status);

      const clientName = job.clientId ? (db.clients.find(c => c.id === job.clientId)?.name || 'Unknown') : (job.title || 'Job');
      const displayTitle = job.title || clientName;

      const jcTitle = document.createElement('div');
      jcTitle.className = 'jc-client';
      jcTitle.textContent = displayTitle;
      card2.appendChild(jcTitle);

      if (job.startTime) {
        const jcTime = document.createElement('div');
        jcTime.className = 'jc-time';
        jcTime.textContent = fmtTime(job.startTime) + (job.endTime ? ' – ' + fmtTime(job.endTime) : '');
        card2.appendChild(jcTime);
      }

      if (job.location) {
        const jcLoc = document.createElement('div');
        jcLoc.className = 'jc-loc';
        jcLoc.textContent = job.location;
        card2.appendChild(jcLoc);
      }

      const chips = document.createElement('div');
      chips.className = 'jc-chips';
      (job.assignedTo || []).forEach(empId => {
        const emp = db.employees.find(e => e.id === empId);
        if (emp) {
          const chip = document.createElement('span');
          chip.className = 'emp-chip';
          chip.style.background = emp.color;
          chip.title = emp.name;
          chip.textContent = getInitials(emp.name);
          chips.appendChild(chip);
        }
      });
      card2.appendChild(chips);

      const badge = document.createElement('div');
      badge.className = 'status-badge ' + status;
      badge.textContent = statusLabel(status);
      card2.appendChild(badge);

      card2.onclick = () => {
        if (MODE === 'admin') {
          openJobModal(job.id, null);
        } else {
          openJobViewModal(job.id);
        }
      };

      body.appendChild(card2);
    });

    if (MODE === 'admin') {
      const addPh = document.createElement('div');
      addPh.className = 'add-day-placeholder';
      addPh.textContent = '+ Add';
      addPh.onclick = () => openJobModal(null, dateStr);
      body.appendChild(addPh);
    }

    col.appendChild(body);
    board.appendChild(col);
  }

  card.appendChild(board);
  panel.innerHTML = '';
  panel.appendChild(card);
}

function getStatusColor(status) {
  switch(status) {
    case 'scheduled': return 'var(--status-scheduled)';
    case 'inprogress': return 'var(--status-inprogress)';
    case 'done': return 'var(--status-done)';
    case 'cancelled': return 'var(--status-cancelled)';
    default: return 'var(--navy)';
  }
}

function statusLabel(status) {
  switch(status) {
    case 'scheduled': return 'Scheduled';
    case 'inprogress': return 'In Progress';
    case 'done': return 'Done';
    case 'cancelled': return 'Cancelled';
    default: return status;
  }
}

function openJobModal(jobId, prefillDate) {
  editingJobId = jobId;
  const job = jobId ? db.jobs.find(j => j.id === jobId) : null;
  document.getElementById('job-modal-title').textContent = jobId ? 'Edit Job' : 'Add Job';

  // Client select
  const clientSel = document.getElementById('jm-client');
  clientSel.innerHTML = '';
  const noneOpt = document.createElement('option');
  noneOpt.value = '';
  noneOpt.textContent = 'No client';
  clientSel.appendChild(noneOpt);
  db.clients.forEach(c => {
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.name;
    clientSel.appendChild(opt);
  });
  clientSel.value = job ? (job.clientId || '') : '';

  document.getElementById('jm-title').value = job ? (job.title||'') : '';
  document.getElementById('jm-location').value = job ? (job.location||'') : '';
  document.getElementById('jm-date').value = job ? job.date : (prefillDate || today());
  document.getElementById('jm-start').value = job ? (job.startTime||'') : '';
  document.getElementById('jm-end').value = job ? (job.endTime||'') : '';
  document.getElementById('jm-status').value = job ? (job.status||'scheduled') : 'scheduled';
  document.getElementById('jm-notes').value = job ? (job.notes||'') : '';

  // Employees
  const empList = document.getElementById('jm-employees');
  empList.innerHTML = '';
  db.employees.forEach(e => {
    const item = document.createElement('div');
    item.className = 'emp-checkbox-item';
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.value = e.id;
    cb.id = 'jm-emp-' + e.id;
    cb.checked = job ? (job.assignedTo||[]).includes(e.id) : false;
    const chip = document.createElement('span');
    chip.className = 'emp-chip';
    chip.style.background = e.color;
    chip.textContent = getInitials(e.name);
    const lbl = document.createElement('label');
    lbl.htmlFor = 'jm-emp-' + e.id;
    lbl.textContent = e.name + (e.role ? ' (' + e.role + ')' : '');
    item.appendChild(cb);
    item.appendChild(chip);
    item.appendChild(lbl);
    empList.appendChild(item);
  });

  const deleteRow = document.getElementById('jm-delete-row');
  deleteRow.style.display = jobId ? 'block' : 'none';
  document.getElementById('jm-save-btn').textContent = jobId ? 'Update Job' : 'Add Job';

  openModal('modal-job');
}

function saveJob() {
  const clientId = document.getElementById('jm-client').value || null;
  const title = document.getElementById('jm-title').value.trim();
  const location = document.getElementById('jm-location').value.trim();
  const date = document.getElementById('jm-date').value;
  const startTime = document.getElementById('jm-start').value;
  const endTime = document.getElementById('jm-end').value;
  const status = document.getElementById('jm-status').value;
  const notes = document.getElementById('jm-notes').value.trim();

  if (!date) { alert('Date is required.'); return; }

  const assignedTo = [];
  document.querySelectorAll('#jm-employees input[type=checkbox]:checked').forEach(cb => assignedTo.push(cb.value));

  const obj = {clientId, title, location, date, startTime, endTime, assignedTo, status, notes};

  if (editingJobId) {
    const idx = db.jobs.findIndex(j => j.id === editingJobId);
    if (idx !== -1) Object.assign(db.jobs[idx], obj);
  } else {
    db.jobs.push({id: uid(), ...obj});
  }

  closeModal('modal-job');
  showTab('schedule');
}

function deleteJob() {
  if (!editingJobId) return;
  const job = db.jobs.find(j => j.id === editingJobId);
  const label = job ? (job.title || (job.clientId && db.clients.find(c => c.id === job.clientId)?.name) || 'this job') : 'this job';
  confirm2('Delete Job', 'Delete "' + label + '"?', () => {
    db.jobs = db.jobs.filter(j => j.id !== editingJobId);
    closeModal('modal-job');
    showTab('schedule');
  });
}

function openJobViewModal(jobId) {
  viewingJobId = jobId;
  const job = db.jobs.find(j => j.id === jobId);
  if (!job) return;

  const jobStatuses = JSON.parse(localStorage.getItem('tp_job_status') || '{}');
  const status = jobStatuses[jobId] || job.status || 'scheduled';

  const clientObj = job.clientId ? db.clients.find(c => c.id === job.clientId) : null;
  const title = job.title || (clientObj ? clientObj.name : 'Job');
  document.getElementById('jv-title').textContent = title;

  const body = document.getElementById('jv-body');
  body.innerHTML = '';

  function addInfoRow(label, val) {
    if (!val) return;
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:.5rem;padding:.3rem 0;font-size:.9rem;';
    const lbl = document.createElement('span');
    lbl.style.cssText = 'color:var(--muted);min-width:100px;font-size:.82rem;font-weight:600;';
    lbl.textContent = label;
    const v = document.createElement('span');
    v.textContent = val;
    row.appendChild(lbl);
    row.appendChild(v);
    body.appendChild(row);
  }

  if (clientObj) addInfoRow('Client:', clientObj.name);
  addInfoRow('Date:', fmtDate(job.date));
  addInfoRow('Time:', job.startTime ? fmtTime(job.startTime) + (job.endTime ? ' – ' + fmtTime(job.endTime) : '') : '');
  addInfoRow('Location:', job.location);
  addInfoRow('Notes:', job.notes);

  if (job.assignedTo && job.assignedTo.length) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;gap:.5rem;align-items:center;padding:.3rem 0;';
    const lbl = document.createElement('span');
    lbl.style.cssText = 'color:var(--muted);min-width:100px;font-size:.82rem;font-weight:600;';
    lbl.textContent = 'Assigned:';
    row.appendChild(lbl);
    const chips = document.createElement('div');
    chips.style.display = 'flex';
    chips.style.gap = '.3rem';
    chips.style.flexWrap = 'wrap';
    job.assignedTo.forEach(empId => {
      const emp = db.employees.find(e => e.id === empId);
      if (emp) {
        const chip = document.createElement('span');
        chip.className = 'emp-chip';
        chip.style.background = emp.color;
        chip.textContent = getInitials(emp.name);
        chip.title = emp.name;
        const name = document.createElement('span');
        name.style.fontSize = '.85rem';
        name.textContent = emp.name;
        chips.appendChild(chip);
        chips.appendChild(name);
        chips.appendChild(document.createTextNode(' '));
      }
    });
    row.appendChild(chips);
    body.appendChild(row);
  }

  const sel = document.getElementById('jv-status-select');
  sel.value = status;

  openModal('modal-job-view');
}

function updateJobStatus() {
  if (!viewingJobId) return;
  const sel = document.getElementById('jv-status-select');
  const statuses = JSON.parse(localStorage.getItem('tp_job_status') || '{}');
  statuses[viewingJobId] = sel.value;
  localStorage.setItem('tp_job_status', JSON.stringify(statuses));
}
